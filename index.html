<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Building Game 🎯</title>
    <link rel="stylesheet" href="style.css">
    <!-- Supabase JS Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>

<body>
    <!-- Animated Background -->
    <div class="bg-animation"></div>
    <div class="floating-shapes">
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
    </div>

    <!-- Confetti Canvas -->
    <canvas id="confetti-canvas"></canvas>

    <div class="container">

        <!-- Error Message Container -->
        <div id="error-message" class="error-message" style="display: none;"></div>

        <!-- Loading Indicator -->
        <div id="loading-indicator" style="display: none; text-align: center; padding: 20px;">
            <div class="loading"></div>
            <p style="margin-top: 10px; color: var(--text-muted);">Loading...</p>
        </div>

        <!-- LANDING SCREEN -->
        <div id="landing-screen" class="game-screen active">

            <div class="glass-card" style="text-align: center;">
                <div class="banner-container">
                    <img style="height: 200px;" src="tollywood-tamasha.png" alt="Tollywood Tamasha">
                </div>
                <!-- Stats -->
                <div class="stats-container">
                    <div class="stat-box">
                        <div class="stat-number" id="used-count">0</div>
                        <div class="stat-label">Used</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-number" id="remaining-count">0</div>
                        <div class="stat-label">Remaining</div>
                    </div>
                </div>

                <!-- Progress Bar -->
                <div class="progress-container">
                    <div class="progress-bar" id="progress-bar"></div>
                </div>

                <!-- Action Buttons -->
                <div class="btn-container">
                    <button id="spin-btn" class="btn btn-primary">Start Game</button>
                    <button id="reset-game-btn" class="btn btn-secondary">Reset All</button>
                </div>
            </div>
        </div>

        <!-- READY SCREEN -->
        <div id="ready-screen" class="game-screen">
            
            <div class="glass-card" style="text-align: center;">
                <div class ="top" style="display: flex;flex-direction: row;justify-content: space-between;">
                    <div class="question-number-display" id="ready-question-number">#1</div>
                    <!-- <div class="banner-container">
                        <img style="height: 150px;" src="tollywood-tamasha.png" alt="Tollywood Tamasha">
                    </div> -->
                </div>

                <div class="question-type-badge" id="ready-question-type">
                    Guess the Movie
                </div>


                <p class="ready-text">Are you ready?</p>

                <div class="btn-container">
                    <button id="ready-next-btn" class="btn btn-accent">Reveal Question</button>
                    <button class="btn btn-secondary" onclick="resetGame()">Home</button>
                    <button id="ready-other-btn" class="btn btn-accent" onclick="spinRandomQuestion()">Other
                        Question</button>
                </div>
            </div>
        </div>

        <!-- QUESTION SCREEN -->
<div id="question-screen" class="game-screen">

    <div class="glass-card">

        <!-- Question Type -->
        <div style="text-align:center;">
            <span class="question-type-badge" id="question-type">Guess the Movie</span>
        </div>

        <!-- Question Number -->
        <div style="text-align:center;margin-bottom:20px;">
            <span id="question-number" style="font-size:1.2rem;color:var(--text-muted);">
                Question #1
            </span>
        </div>

        <!-- Layout -->
        <div class="question-layout">

            <!-- Media -->
            <div class="media-container" id="media-container">
                <div class="media-placeholder">Loading media...</div>
            </div>

            <!-- Question Text -->
            <div class="question-text-container" id="question-text-container">
                <div id="question-text"></div>
            </div>

            <!-- Side Panel -->
            <div class="question-side">

                <div class="timer-container" id="timer-container">

                    <div class="timer-display" id="timer-display">

                        <svg class="timer-ring-container" viewBox="0 0 156 156">

                            <circle class="timer-ring-bg" cx="78" cy="78" r="74"></circle>

                            <circle class="timer-ring-progress"
                                    id="timer-ring"
                                    cx="78"
                                    cy="78"
                                    r="74"></circle>

                        </svg>

                        <span id="timer-text">10</span>

                    </div>

                    <!-- <span class="timer-label" id="timer-label">Seconds</span> -->

                </div>

            </div>

        </div>

        <!-- Answer Overlay -->
        <div id="answer-overlay" class="answer-overlay">

            <div class="answer-card">

                <button class="answer-close-btn"
                        onclick="closeAnswerOverlay()">✕</button>

                <h2>Answer</h2>

                <div id="answer-text"></div>

            </div>

        </div>

        <!-- Buttons -->
        <div class="btn-container">

            <button id="start-timer-btn"
                    class="btn btn-primary">Start Timer</button>

            <button id="reveal-answer-btn"
                    class="btn btn-success"
                    style="display:none;">Reveal Answer</button>

            <button class="btn btn-success"
                    onclick="location.href='index.html'">Home</button>

        </div>

        <div id="next-question-btn-container"
             style="display:none;text-align:center;margin-top:20px;">

            <button class="btn btn-success"
                    onclick="playNextQuestion()">Next Question</button>

        </div>

    </div>

</div>
    </div>

    <!-- Admin Link -->
    <a href="admin.html" class="admin-link">⚙️ Admin Panel</a>

    <!-- Scripts -->
    <script src="supabase.js"></script>
    <script src="app.js"></script>
</body>

</html>
